services:
  server:
    build:
      context: .
    env_file:
      - .env
    environment:
      - DB_PASSWORD=${DB_PASSWORD?Variable not set}
      - DB_USER=${DB_USER:-user}
      - DB_NAME=${DB_NAME:-orders}
      - DB_HOST=db
    ports:
      - ${BACKEND_PORT:-8080}:8080
    develop:
      watch:
        - path: .
          action: rebuild
        - path: ./src
          action: sync
          target: /build/src
    depends_on:
      db:
        condition: service_healthy
  db:
    image: mysql:oraclelinux9
    restart: always
    env_file:
      - .env
    environment:
      - MYSQL_ROOT_PASSWORD=${DB_PASSWORD?Variable not set}
      - MYSQL_ALLOW_EMPTY_PASSWORD=no
      - MYSQL_USER=${DB_USER:-user}
      - MYSQL_DATABASE=${DB_NAME:-orders}
    ports:
      - ${DB_PORT:-3306}:3306
    volumes:
      - app-data:/var/lib/mysql
    healthcheck:
      test: [ "CMD", "mysqladmin" ,"ping", "-h", "localhost" ]
      timeout: 5s
      retries: 10
volumes:
  app-data: